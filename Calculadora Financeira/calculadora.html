<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>
    <h2>Calculadora SafeSoja</h2>

    Água por irrigação (litros):<br>
    <input type="text" id="agua"><br><br>

    Vezes no mês:<br>
    <input type="text" id="vezes"><br><br>

    Custo por litro (R$):<br>
    <input type="text" id="custoAgua"><br><br>

    Valor por saca (R$):<br>
    <input type="text" id="valorSaca"><br><br>

    Sacas vendidas:<br>
    <input type="text" id="sacasVendidas"><br><br>

    Sacas perdidas:<br>
    <input type="text" id="sacasPerdidas"><br><br>

    <button onclick="analisar()">Ver análise</button>

    <div id="resultado"></div>
</body>
</html>

<script>
function analisar() {
// inputs
    let aguaL = Number(agua.value);
    let vezesM = Number(vezes.value);
    let custoL = Number(custoAgua.value);
    let valor = Number(valorSaca.value);
    let vendidas = Number(sacasVendidas.value);
    let perdidas = Number(sacasPerdidas.value);

//consumo de agua
    let consumo = aguaL * vezesM;
    let custoTotalAgua = consumo * custoL;

//valores de produção    
    let total = vendidas + perdidas;
    let faturamento = vendidas * valor;
    let perda = perdidas * valor;
    let lucro = faturamento - perda - custoTotalAgua;
    let porcentagemPerda = 0;
    let eficiencia = 0;

    if (total > 0) {
        porcentagemPerda = (perdidas / total) * 100;
        eficiencia = (vendidas / total) * 100;
    }

    let lucroPorSaca = 0;
    if (vendidas > 0) {
        lucroPorSaca = lucro / vendidas;
    }

    let situacao = "";

    if (eficiencia >= 90) {
        situacao = "Produção excelente";
    } else if (eficiencia >= 70) {
        situacao = "Produção boa";
    } else if (eficiencia >= 50) {
        situacao = "Produção média";
    } else {
        situacao = "Produção baixa";
    }

    resultado.innerHTML = `
    <br><b>ANÁLISE</b><br><br>

    Água total: ${consumo} L<br>
    Custo da água: R$ ${custoTotalAgua.toFixed(2)}<br><br>

    Faturamento: R$ ${faturamento.toFixed(2)}<br>
    Perda: R$ ${perda.toFixed(2)}<br>
    Lucro líquido: R$ ${lucro.toFixed(2)}<br><br>

    Desperdício: ${porcentagemPerda.toFixed(2)}%<br>
    Eficiência: ${eficiencia.toFixed(2)}%<br><br>

    Lucro por saca: R$ ${lucroPorSaca.toFixed(2)}<br><br>

    Situação: ${situacao}
    `;
}
</script>
