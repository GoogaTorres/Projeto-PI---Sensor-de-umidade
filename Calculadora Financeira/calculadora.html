<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Calculadora SafeSoja</title>
</head>

<body>
    <h3>Calculadora SafeSoja</h3><br>

    Cargo:
    <select id="Cargo" onchange="ver()">
        <option value="">Selecione...</option>
        <option value="1">Funcionário</option>
        <option value="2">Cliente</option>
    </select>

    <div id="texto"></div>
</body>

<script>
    function ver() {
        let cargo = Cargo.value;
        
        if (cargo == "1") {
            texto.innerHTML = `
                <h4>Calculadora do Funcionário</h4>
                Qual o tamanho do terreno? (hectares)<br>
                <input type="text" id="terreno"><br><br>

                Qual o nível de umidade do hectare?<br>
                <input type="text" id="umidade"><br><br>

                <button onclick="calcular()">Calcular</button>
                <div id="resultado"></div>
            `;
        } else if (cargo == "2") {
            texto.innerHTML = `
                <h4>Calculadora do Cliente</h4>
                Qual o preço de venda? (saca)<br>
                <input type="text" id="preco"><br><br>

                Quantos sacos foram vendidos?<br>
                <input type="text" id="venda"><br><br>

                Quanto de água foi utilizado? (litros)<br>
                <input type="text" id="agua"><br><br>

                <button onclick="calcularCliente()">Calcular</button>
                <div id="resultado"></div>
            `;
        }
    }

    function calcular() {
        resultado.innerHTML = `Consumo estimado: X litros`;
    }

    function calcularCliente() {
        resultado.innerHTML = `
             Lucro estimado: R$ </b>
        `;
    }
</script>

</html>
