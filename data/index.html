<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sensores</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            padding: 30px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .topo {
            margin-bottom: 30px;
        }

        .topo h1 {
            font-size: 32px;
            margin-bottom: 8px;
            color: #f8fafc;
        }

        .topo p {
            color: #cbd5e1;
            font-size: 16px;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .card-info {
            flex: 1;
            min-width: 220px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 20px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }

        .card-info h3 {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .card-info p {
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
        }

        .graficos {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .grafico-card {
            flex: 1;
            min-width: 320px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(8px);
        }

        .grafico-card h2 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .grafico-card span {
            color: #94a3b8;
            font-size: 14px;
            display: block;
            margin-bottom: 15px;
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }

        @media (max-width: 768px) {
            .topo h1 {
                font-size: 24px;
            }

            .card-info p {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="topo">
            <h1>Dashboard de Monitoramento</h1>
            <p>Acompanhamento em tempo real dos sensores analógico e digital</p>
        </div>

        <div class="cards">
            <div class="card-info">
                <h3>Média dos valores</h3>
                <p id="valorAnalogico">--</p>
            </div>

            <div class="card-info">
                <h3>Último valor digital</h3>
                <p id="valorDigital">--</p>
            </div>

            <div class="card-info">
                <h3>Status do sistema</h3>
                <p id="statusSistema">Ativo</p>
            </div>
        </div>

        <div class="graficos">
            

            <div class="grafico-card">
                <h2>Sensor Digital</h2>
                <span>Leitura binária em tempo real</span>
                <canvas id="sensorDigital"></canvas>
            </div>
        </div>
    </div>

    <script>
        
        var sensorDigital = new Chart(document.getElementById('sensorDigital').getContext('2d'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Digital',
                    data: [],
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.2)',
                    fill: true,
                    tension: 0.3,
                    borderWidth: 3,
                    pointRadius: 3,
                    pointBackgroundColor: '#3b82f6'
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: {
                            color: 'white'
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: '#cbd5e1'
                        },
                        grid: {
                            color: 'rgba(255,255,255,0.08)'
                        }
                    },
                    y: {
                        beginAtZero: true,
                        ticks: {
                            color: '#cbd5e1',
                            stepSize: 1
                        },
                        title: {
                            display: true,
                            text: '(Umidade)',
                            color: 'white'
                        },
                        grid: {
                            color: 'rgba(255,255,255,0.08)'
                        }
                    }
                }
            }
        });

        var paginacao = {};
        var tempo = {};

        function obterDados(grafico, endpoint) {
            fetch('http://localhost:3300/sensores/' + endpoint)
                .then(response => response.json())
                .then(valores => {
                    if (paginacao[endpoint] == null) {
                        paginacao[endpoint] = 0;
                    }

                    if (tempo[endpoint] == null) {
                        tempo[endpoint] = 0;
                    }

                    var ultimaPaginacao = paginacao[endpoint];
                    paginacao[endpoint] = valores.length;
                    valores = valores.slice(ultimaPaginacao);

                    valores.forEach((valor) => {
                        if (grafico.data.labels.length == 10 && grafico.data.datasets[0].data.length == 10) {
                            grafico.data.labels.shift();
                            grafico.data.datasets[0].data.shift();
                        }

                        grafico.data.labels.push(tempo[endpoint]++);
                        grafico.data.datasets[0].data.push(parseFloat(valor));
                        grafico.update();

                        let dados = grafico.data.datasets[0].data;

let soma = dados.reduce((acumulador, valorAtual) => acumulador + valorAtual, 0);

let media = soma / dados.length;
                    

                        if (endpoint == 'digital') {
                            valorDigital.innerHTML = parseFloat(valor);
                        }
                         if (endpoint == 'digital') {
                            valorAnalogico.innerHTML = media.toFixed(2);
                        }
                    });
                })
                .catch(error => {
                    console.error('Erro ao obter dados:', error);
                    statusSistema.innerHTML = 'Erro';
                });
        }

        setInterval(() => {
            
            obterDados(sensorDigital, 'digital');
        }, 1000);
    </script>
</body>

</html>
