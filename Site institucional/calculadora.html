<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora | SafeSoja</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <header>
        <div class="header">
            <div class="logo">
                <img onclick="window.location.href='index.html'" src="./images/Logo_da_Safe_Soja.png">
            </div>

             <div class="botoes dashcal">
                <button class="nav_botao" onclick="window.location.href='http:dash.html'">Dashboard</button>
                <div class="botao-inicial">
                    <img src="./images/home.png" class="homeicon" alt="">
                    <button class="nav_botao inicial" onclick="window.location.href='http:index.html'">Página
                        inicial</button>
                </div>
            </div>

        </div>
    </header>

    <div class="container">
        <div class="topo">
            <h1>Calculadora SafeSoja</h1>
            <p>Análise de consumo, produção e lucro da produção</p>
        </div>

        <div class="painel">
            <div class="card-form">
                <h2>Inserir dados</h2>

                <div class="campo">
                    <label>Água por irrigação (litros)</label>
                    <input type="text" id="agua" placeholder="Ex: 80">
                </div>

                <div class="campo">
                    <label>Vezes no mês</label>
                    <input type="text" id="vezes" placeholder="Ex: 20">
                </div>

                <div class="campo">
                    <label>Custo por litro (R$)</label>
                    <input type="text" id="custoAgua" placeholder="Ex: 3.29">
                </div>

                <div class="campo">
                    <label>Valor por saca (R$)</label>
                    <input type="text" id="valorSaca" placeholder="Ex: 130">
                </div>

                <div class="campo">
                    <label>Sacas vendidas</label>
                    <input type="text" id="sacasVendidas" placeholder="Ex: 60">
                </div>

                <div class="campo">
                    <label>Sacas perdidas</label>
                    <input type="text" id="sacasPerdidas" placeholder="Ex: 5">
                </div>

                <button onclick="analisar()">Ver análise</button>
            </div>

            <div class="dashboard">
                <div class="cards">
                    <div class="card">
                        <h3>Água no mês</h3>
                        <p id="cardAgua">0 L</p>
                    </div>

                    <div class="card">
                        <h3>Custo mensal</h3>
                        <p id="cardCusto">R$ 0,00</p>
                    </div>

                    <div class="card">
                        <h3>Prejuízo pelas perdas</h3>
                        <p id="cardPrejuizo">R$ 0,00</p>
                    </div>

                    <div class="card">
                        <h3>Lucro</h3>
                        <p id="cardLucro">R$ 0,00</p>
                    </div>

                    <div class="card">
                        <h3>Faturamento</h3>
                        <p id="cardFaturamento">R$ 0,00</p>
                    </div>

                    <div class="card">
                        <h3>Taxa de perda</h3>
                        <p id="cardTaxaPerda">0%</p>
                    </div>
                
                </div>

                <div class="detalhes">
                    <h2>Relatório de Desempenho</h2>
                    <br><br>
                    <div class="descer">
                    <div id="resultado"></div>
                    <div id="resultado1"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<script>
    function analisar() {
        let aguaL = Number(agua.value);
        let vezesM = Number(vezes.value);
        let custoL = Number(custoAgua.value);
        let valor = Number(valorSaca.value);
        let vendidas = Number(sacasVendidas.value);
        let perdidas = Number(sacasPerdidas.value);

        let consumoMes = 0;
        for (let i = 0; i < vezesM; i++) {
            consumoMes += aguaL;
            
        let custoTotalAgua = 0;
        for (let i = 0; i < vezesM; i++) {
            custoTotalAgua += aguaL * custoL;
        }
            
        let totalSacas = vendidas + perdidas;

        let faturamentoReal = vendidas * valor;
        let faturamentoPotencial = totalSacas * valor;
        let prejuizoPerdas = perdidas * valor;
        let lucro = faturamentoReal - custoTotalAgua;

        let porcentagemPerda = 0;
        let eficiencia = 0;
        let lucroPorSaca = 0;
        let custoAguaPorSaca = 0;

        if (totalSacas > 0) {
            porcentagemPerda = (perdidas / totalSacas) * 100;
            eficiencia = (vendidas / totalSacas) * 100;
        }

        if (vendidas > 0) {
            lucroPorSaca = lucro / vendidas;
            custoAguaPorSaca = custoTotalAgua / vendidas;
        }

        let situacao = "";
        let classe = "";

        if (eficiencia >= 90) {
            situacao = "Produção excelente";
            classe = "bom";
        } else if (eficiencia >= 75) {
            situacao = "Produção boa";
            classe = "bom";
        } else if (eficiencia >= 60) {
            situacao = "Produção regular";
            classe = "medio";
        } else {
            situacao = "Produção baixa";
            classe = "ruim";
        }

        let corLucro = "";
        let alerta = "";
        let classeLucro = "";

        if (lucro > 0) {
            alerta = "A operação está dando lucro.";
            classeLucro = "bom";
            corLucro = "green";
        } else if (lucro == 0) {
            alerta = "A operação está empatada.";
            classeLucro = "medio";
        } else {
            alerta = "A operação está dando prejuízo.";
            classeLucro = "ruim";
            corLucro = "red";
        }

        cardAgua.innerHTML = `<span style="color: blue;">${consumoMes.toFixed(2)}L`;
        cardCusto.innerHTML = `R$ ${custoTotalAgua.toFixed(2)}`;
        cardFaturamento.innerHTML = `R$ ${faturamentoReal.toFixed(2)}`;
        cardLucro.innerHTML = `<span style="color: ${corLucro};">R$ ${lucro.toFixed(2)}</span>`;
        cardPrejuizo.innerHTML = `<span style="color: red;">R$ ${prejuizoPerdas.toFixed(2)}</span>`;
        cardTaxaPerda.innerHTML = `${porcentagemPerda.toFixed(2)}%`;
        resultado.innerHTML = `Situação atual: <span class="${classe}">${situacao}</span><br>`;
        resultado1.innerHTML =`Lucro: <span class="${classeLucro}">${alerta}</span>`;
    }
}
</script>
