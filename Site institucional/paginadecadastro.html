<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styleloginecadastro.css">
</head>

<body>
    <header>
        <div class="header"> 
            <div class="logo">
                <img onclick="window.location.href='http://127.0.0.1:5500/index.html'" src="./Logo_da_Safe_Soja.png">
            </div>
            <div class="botoes">
                <button class="nav_botao">Serviços</button>
                <button class="nav_botao">Projeto</button>
                <button class="nav_botao" onclick="window.location.href='http://127.0.0.1:5500/beneficios.html'">Benefícios</button>
                 <button class="nav_botao"  onclick="window.location.href='http://127.0.0.1:5500/Equipe.html'">Nossa equipe</button>



            </div>
        </div>
        <div class="login_container">

            <h2> Insira um email valido</h2>

            <input type="text" placeholder="Usuário" id="input_cadastro">

            <h2> Insira uma senha valida</h2>

            <input type="text" placeholder="Senha" id="input_criesenha">

            <input type="password" placeholder="Repita Senha" id="input_repita">

            <button class="btn_entrar" onclick="Criar()">Criar</button>
                <b style="color: red;"></b>
            <div id="div_mensagem"></div>
        </div>
    </header>

    <script>
         function irLogin() {

         window.location.href = "http://127.0.0.1:5500/paginaLogin.html";
        
         }
        function Criar() {

            let email = input_cadastro.value
            let senha = input_criesenha.value
            let repita = input_repita.value
            let forca = 0


            if (senha.length <= 8) {
                div_mensagem.innerHTML = `<b style="color: red;">A senha deve conter mais de 7 caracteres</b>`
            }
            if (senha = senha.toLowerCase()) {
                div_mensagem.innerHTML = `<b style="color: red;">A senha deve conter letras maiusculas</b>`
            }
            if (senha = senha.toUpperCase()) {
                div_mensagem.innerHTML = `<b style="color: red;">A senha deve conter letras minusculas</b>`
            }
              
            



            if (email.endsWith('.com') && forca >= 2 && repita == senha) {
                div_mensagem.innerHTML = `<p>Seu usuário foi criado ✅</p>
            <button class="btn_entrar" onclick="irLogin()">Ir para login</button>`
            } else if (senha == '') {
                div_mensagem.innerHTML = `Insira uma senha `
            } else if (forca <= 2) {
                div_mensagem.innerHTML = ` `
            }
            else if (repita != senha) {
                div_mensagem.innerHTML = `Senha não está igual `
            } else if (email == '') {
                div_mensagem.innerHTML = `Insira um email`
            } else {
                div_mensagem.innerHTML = `email invalido`
            }
         
        }


    </script>
