<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Dashboard</title>
    <link rel="stylesheet" href="./styles/styledash.css">
</head>
<body>

<header>
    <div class="header"> 
        <div class="logo">
            <img src="./images/Logo_da_Safe_Soja.png" onclick="window.location.href='index.html'">
        </div>

        <div class="botoes">
            <button class="nav_botao" onclick="window.location.href='calculadora.html'">Calculadora</button>
            <button style="color: red;" class="nav_botao" onclick="window.location.href='http:index.html'">Sair</button>
        </div>
    </div>

<div class="dashboard">

    <div class="cards">

        <div class="card">

            <p>Sem dados</p>

    </div>

</div>
